# Pendulum-v1 demo, continuous-action variant of the CartPole demo.
# Use this as the smoke test for the continuous-action wiring of
# GymPolicy + GymRolloutEngine. Same file plays the dual policy-model
# config / cosmos-rl launcher config role as cartpole_colocated.toml.

# --- Cosmos-rl deployment ---
#
# Top-level keys MUST come before any [section] header in TOML; otherwise
# they'd be parsed as members of the preceding section (e.g. ``mode``
# placed after [env] becomes ``env.mode`` and ``Config.mode`` defaults
# to "disaggregated", silently routing the launcher into the wrong path).
mode = "colocated"

# --- Policy model config (read by register_gym_policy's loader) ---

[model]
obs_dim     = 3
action_dim  = 1
hidden_dim  = 64
discrete    = false

[env]
name        = "Pendulum-v1"
max_steps   = 200

# --- Cosmos-rl training ---

[train]
output_dir = "./outputs/gym-pendulum"
optm_name = "Adam"
optm_lr = 3.0e-4
optm_grad_norm_clip = 1.0
optm_warmup_steps = 0
train_batch_per_replica = 4
non_text = true
compile = false
epoch = 1

[train.train_policy]
type = "grpo"           # discriminator value; the actual trainer is gym_pg below
trainer_type = "gym_pg"
mini_batch = 4
# kl_beta = 0.0 nudges Config.preprocess into the GRPO branch — see
# cartpole_colocated.toml for the rationale.
kl_beta = 0.0

[train.ckpt]
enable_checkpoint = false

# --- Cosmos-rl rollout ---

[rollout]
backend = "gym"
n_generation = 1

[rollout.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 1
pp_size = 1
dp_replicate_size = 1

# --- Cosmos-rl policy ---

[policy]
# Self-reference; see cartpole_colocated.toml for the rationale.
model_name_or_path = "cosmos_rl/tools/gym_example/configs/pendulum_colocated.toml"
model_gradient_checkpointing = false

[policy.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 1
pp_size = 1
dp_replicate_size = 1

# --- Logging ---

[logging]
logger = ['console']
project_name = "cosmos-rl-gym"
experiment_name = "pendulum-colocated"

# --- Custom (gym-specific knobs) ---

[custom]
payload_transfer = "redis"
env_name = "Pendulum-v1"
max_steps = 200
gamma = 0.99
max_grad_norm = 1.0
