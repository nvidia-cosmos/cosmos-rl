# CartPole-v1 demo, colocated mode (rollout + trainer share one node).
#
# This file plays a dual role:
#
#   * It is the cosmos-rl launcher config: cosmos-rl reads [train], [rollout],
#     [policy], etc.
#   * It is also the policy *model* config: register_gym_policy() registers
#     a loader that, given a .toml path, returns a GymMLPConfig built from
#     the [model] section. We therefore set policy.model_name_or_path to
#     this same file (self-reference), so cosmos-rl resolves the policy
#     through the gym-config loader.
#
# Launch (single-replica colocated; the supported launch matrix is in
# cosmos_rl/tools/gym_example/README.md):
#
#   cosmos-rl --config cosmos_rl/tools/gym_example/configs/cartpole_colocated.toml \
#             cosmos_rl/tools/gym_example/gym_entry.py

# --- Cosmos-rl deployment ---
#
# Top-level keys MUST come before any [section] header in TOML; otherwise
# they'd be parsed as members of the preceding section (e.g. ``mode``
# placed after [env] becomes ``env.mode`` and ``Config.mode`` defaults
# to "disaggregated", silently routing the launcher into the wrong path).
mode = "colocated"

# --- Policy model config (read by register_gym_policy's loader) ---

[model]
obs_dim     = 4
action_dim  = 2
hidden_dim  = 64
discrete    = true

[env]
name        = "CartPole-v1"
max_steps   = 500

# --- Cosmos-rl training ---

[train]
output_dir = "./outputs/gym-cartpole"
optm_name = "Adam"
optm_lr = 3.0e-4
optm_grad_norm_clip = 1.0
optm_warmup_steps = 0
train_batch_per_replica = 4
non_text = true
compile = false
epoch = 1

[train.train_policy]
type = "grpo"           # discriminator value; the actual trainer is gym_pg below
trainer_type = "gym_pg"
mini_batch = 4

[train.ckpt]
enable_checkpoint = false

# --- Cosmos-rl rollout ---

[rollout]
backend = "gym"
n_generation = 1

[rollout.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 1
pp_size = 1
dp_replicate_size = 1

# --- Cosmos-rl policy ---

[policy]
# Self-reference: the cosmos-rl policy points back at this file, which the
# gym-config loader (register_gym_policy) parses to materialize a GymPolicy
# from the [model] section above.
model_name_or_path = "cosmos_rl/tools/gym_example/configs/cartpole_colocated.toml"
model_gradient_checkpointing = false

[policy.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 1
pp_size = 1
dp_replicate_size = 1

# --- Logging ---

[logging]
logger = ['console']
project_name = "cosmos-rl-gym"
experiment_name = "cartpole-colocated"

# --- Custom (gym-specific knobs) ---

[custom]
# Use the implicit Redis transport: payload sizes are tiny so there's
# no benefit to NCCL/UCXX for CartPole. Switch to "ucxx" or "nccl"
# when scaling up to larger observation tensors.
payload_transfer = "redis"
env_name = "CartPole-v1"
max_steps = 500
gamma = 0.99
max_grad_norm = 1.0
